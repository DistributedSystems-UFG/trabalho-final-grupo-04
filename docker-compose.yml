version: '3.9'

# Ordem de inicialização: Mosquitto e RabbitMQ → coletores de zona → gateway → dashboard/worker → sensores

services:
  # ── Infraestrutura ──────────────────────────────────────────────────────────

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: citypulse-mosquitto
    ports:
      - "1883:1883"   # MQTT (interno + testes locais)
      - "9001:9001"   # WebSocket MQTT (opcional para debug)
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - citypulse

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: citypulse-rabbitmq
    ports:
      - "5672:5672"   # AMQP (interno)
      - "15672:15672" # Painel de administração
    environment:
      RABBITMQ_DEFAULT_USER: citypulse
      RABBITMQ_DEFAULT_PASS: citypulse
    networks:
      - citypulse

  # ── Serviço de ingestão (Integrante 1) ─────────────────────────────────────

  ingestao:
    build:
      context: ./sensores-simulados
      dockerfile: Dockerfile
    container_name: citypulse-ingestao
    command: ["node_modules/.bin/ts-node", "src/ingestao.ts"]
    ports:
      - "3001:3001"
    environment:
      INGESTAO_PORT: 3001
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on:
      - mosquitto
    networks:
      - citypulse

  # ── Sensores simulados — zona centro ────────────────────────────────────────

  sensor-centro-temperatura:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-centro-temp-01
      ZONA_ID: centro
      TIPO: temperatura
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-centro-qualidade-ar:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-centro-qar-01
      ZONA_ID: centro
      TIPO: qualidade_ar
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-centro-vagas:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-centro-vagas-01
      ZONA_ID: centro
      TIPO: vagas_estacionamento
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-centro-energia:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-centro-energia-01
      ZONA_ID: centro
      TIPO: consumo_energia
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  # ── Sensores simulados — zona norte ─────────────────────────────────────────

  sensor-norte-temperatura:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-norte-temp-01
      ZONA_ID: norte
      TIPO: temperatura
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-norte-qualidade-ar:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-norte-qar-01
      ZONA_ID: norte
      TIPO: qualidade_ar
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-norte-vagas:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-norte-vagas-01
      ZONA_ID: norte
      TIPO: vagas_estacionamento
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-norte-energia:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-norte-energia-01
      ZONA_ID: norte
      TIPO: consumo_energia
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  # ── Sensores simulados — zona sul ────────────────────────────────────────────

  sensor-sul-temperatura:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-sul-temp-01
      ZONA_ID: sul
      TIPO: temperatura
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-sul-qualidade-ar:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-sul-qar-01
      ZONA_ID: sul
      TIPO: qualidade_ar
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-sul-vagas:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-sul-vagas-01
      ZONA_ID: sul
      TIPO: vagas_estacionamento
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-sul-energia:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-sul-energia-01
      ZONA_ID: sul
      TIPO: consumo_energia
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  # ── Sensores simulados — zona leste ─────────────────────────────────────────

  sensor-leste-temperatura:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-leste-temp-01
      ZONA_ID: leste
      TIPO: temperatura
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-leste-qualidade-ar:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-leste-qar-01
      ZONA_ID: leste
      TIPO: qualidade_ar
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-leste-vagas:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-leste-vagas-01
      ZONA_ID: leste
      TIPO: vagas_estacionamento
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  sensor-leste-energia:
    build: { context: ./sensores-simulados }
    environment:
      SENSOR_ID: sensor-leste-energia-01
      ZONA_ID: leste
      TIPO: consumo_energia
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on: [mosquitto]
    networks: [citypulse]

  # ── Coletores de Zona (Integrante 2) ────────────────────────────────────────
  # Cada zona = 1 primário + 1 réplica (mesmo binário Java, parametrizado por ZONA_ID).
  # O gateway lê sempre do primário (coletor-<zona>:5005x). O serviço interno de
  # replicação (porta 60051) fica entre primário e réplica e não é exposto.
  # Portas gRPC publicadas no host para teste com grpcurl:
  #   primários 50051-50054 ; réplicas 50055-50058.

  # zona centro
  coletor-centro:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-centro
    environment:
      ZONA_ID: centro
      PAPEL_INICIAL: PRIMARIO
      GRPC_PORT: 50051
      REPLICA_ADDR: coletor-centro-replica:60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50051:50051"]
    depends_on: [mosquitto]
    networks: [citypulse]
  coletor-centro-replica:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-centro-replica
    environment:
      ZONA_ID: centro
      PAPEL_INICIAL: REPLICA
      GRPC_PORT: 50051
      REPLICACAO_PORT: 60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50055:50051"]
    depends_on: [mosquitto]
    networks: [citypulse]

  # zona norte
  coletor-norte:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-norte
    environment:
      ZONA_ID: norte
      PAPEL_INICIAL: PRIMARIO
      GRPC_PORT: 50052
      REPLICA_ADDR: coletor-norte-replica:60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50052:50052"]
    depends_on: [mosquitto]
    networks: [citypulse]
  coletor-norte-replica:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-norte-replica
    environment:
      ZONA_ID: norte
      PAPEL_INICIAL: REPLICA
      GRPC_PORT: 50052
      REPLICACAO_PORT: 60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50056:50052"]
    depends_on: [mosquitto]
    networks: [citypulse]

  # zona sul
  coletor-sul:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-sul
    environment:
      ZONA_ID: sul
      PAPEL_INICIAL: PRIMARIO
      GRPC_PORT: 50053
      REPLICA_ADDR: coletor-sul-replica:60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50053:50053"]
    depends_on: [mosquitto]
    networks: [citypulse]
  coletor-sul-replica:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-sul-replica
    environment:
      ZONA_ID: sul
      PAPEL_INICIAL: REPLICA
      GRPC_PORT: 50053
      REPLICACAO_PORT: 60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50057:50053"]
    depends_on: [mosquitto]
    networks: [citypulse]

  # zona leste
  coletor-leste:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-leste
    environment:
      ZONA_ID: leste
      PAPEL_INICIAL: PRIMARIO
      GRPC_PORT: 50054
      REPLICA_ADDR: coletor-leste-replica:60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50054:50054"]
    depends_on: [mosquitto]
    networks: [citypulse]
  coletor-leste-replica:
    build: { context: ./coletor-zona }
    container_name: citypulse-coletor-leste-replica
    environment:
      ZONA_ID: leste
      PAPEL_INICIAL: REPLICA
      GRPC_PORT: 50054
      REPLICACAO_PORT: 60051
      MQTT_BROKER_URL: tcp://mosquitto:1883
    ports: ["50058:50054"]
    depends_on: [mosquitto]
    networks: [citypulse]

  # ── Gateway de API (Integrante 3) ───────────────────────────────────────────

  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: citypulse-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      RABBITMQ_URL: amqp://citypulse:citypulse@rabbitmq:5672
      COLETOR_CENTRO_ADDR: coletor-centro:50051
      COLETOR_CENTRO_REPLICA_ADDR: coletor-centro-replica:50051
      COLETOR_NORTE_ADDR: coletor-norte:50052
      COLETOR_NORTE_REPLICA_ADDR: coletor-norte-replica:50052
      COLETOR_SUL_ADDR: coletor-sul:50053
      COLETOR_SUL_REPLICA_ADDR: coletor-sul-replica:50053
      COLETOR_LESTE_ADDR: coletor-leste:50054
      COLETOR_LESTE_REPLICA_ADDR: coletor-leste-replica:50054
    depends_on:
      - mosquitto
      - rabbitmq
    networks:
      - citypulse

  # ── Dashboard (Integrante 4) ────────────────────────────────────────────────

  dashboard:
    build:
      context: ./dashboard
      args:
        # URL pública do gateway, acessada pelo navegador do operador (não pela rede Docker).
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:3000
    container_name: citypulse-dashboard
    ports:
      - "3002:3002"
    depends_on:
      - gateway-api
    networks:
      - citypulse

  # ── Worker de manutenção (Integrante 4) ─────────────────────────────────────

  worker-manutencao:
    build:
      context: ./worker-manutencao
    container_name: citypulse-worker
    environment:
      RABBITMQ_URL: amqp://citypulse:citypulse@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: unless-stopped
    networks:
      - citypulse

networks:
  citypulse:
    driver: bridge
